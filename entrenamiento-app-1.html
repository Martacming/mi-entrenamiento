<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Plan de Fuerza</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B;
    --peach: #FFB347;
    --mint: #4ECDC4;
    --lavender: #A29BFE;
    --rose: #FD79A8;
    --cream: #FFF9F0;
    --charcoal: #2D3436;
    --mid: #636E72;
    --light: #DFE6E9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--coral) 0%, var(--peach) 50%, var(--rose) 100%);
    padding: 2rem 1.5rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 20%;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    color: white;
    position: relative;
    z-index: 1;
  }
  .header p {
    color: rgba(255,255,255,0.9);
    font-size: 0.9rem;
    margin-top: 0.4rem;
    position: relative;
    z-index: 1;
  }
  .header-stats {
    display: flex;
    gap: 1rem;
    margin-top: 1.2rem;
    position: relative;
    z-index: 1;
  }
  .stat-badge {
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 0.3rem 0.8rem;
    font-size: 0.78rem;
    color: white;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }

  /* PROGRESS BAR */
  .progress-section {
    background: white;
    margin: 1rem;
    border-radius: 16px;
    padding: 1.2rem;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.6rem;
    color: var(--charcoal);
  }
  .progress-bar {
    background: var(--light);
    border-radius: 20px;
    height: 12px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--coral), var(--peach));
    height: 100%;
    border-radius: 20px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .week-complete-msg {
    display: none;
    text-align: center;
    margin-top: 0.8rem;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--coral);
  }

  /* WEEK NAV */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    margin: 0.5rem 0;
  }
  .week-nav h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    color: var(--charcoal);
  }
  .week-btn {
    background: white;
    border: 2px solid var(--light);
    border-radius: 10px;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 1rem;
    color: var(--mid);
    transition: all 0.2s;
  }
  .week-btn:hover { border-color: var(--coral); color: var(--coral); }
  .week-btn:disabled { opacity: 0.3; cursor: default; }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 0.5rem;
    padding: 0 1rem;
    overflow-x: auto;
    scrollbar-width: none;
    margin: 0.8rem 0;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 0.5rem 1rem;
    border-radius: 30px;
    border: 2px solid var(--light);
    background: white;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--mid);
    transition: all 0.2s;
    position: relative;
  }
  .day-tab.active {
    background: linear-gradient(135deg, var(--coral), var(--peach));
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,107,0.35);
  }
  .day-tab.done-day::after {
    content: '✓';
    position: absolute;
    top: -6px; right: -6px;
    background: var(--mint);
    color: white;
    width: 16px; height: 16px;
    border-radius: 50%;
    font-size: 0.6rem;
    display: flex; align-items: center; justify-content: center;
  }

  /* DAY CONTENT */
  .day-content {
    padding: 0 1rem 2rem;
  }
  .day-header {
    background: linear-gradient(135deg, #f8f9fa, #fff);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    border-left: 4px solid var(--mint);
  }
  .day-header h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    color: var(--charcoal);
  }
  .day-header p {
    font-size: 0.82rem;
    color: var(--mid);
    margin-top: 0.3rem;
  }
  .day-tag {
    display: inline-block;
    background: var(--mint);
    color: white;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    margin-top: 0.5rem;
  }
  .day-tag.rest { background: var(--lavender); }
  .day-tag.mobility { background: var(--rose); }

  /* EXERCISE CARD */
  .exercise-card {
    background: white;
    border-radius: 16px;
    margin-bottom: 1rem;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid transparent;
  }
  .exercise-card.completed {
    border-color: var(--mint);
    background: linear-gradient(135deg, #f0fffe, white);
  }
  .exercise-card:active { transform: scale(0.99); }
  .card-top {
    display: flex;
    align-items: center;
    padding: 1rem;
    gap: 1rem;
    cursor: pointer;
  }
  .exercise-emoji {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .card-info { flex: 1; }
  .card-info h4 {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--charcoal);
  }
  .card-meta {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.4rem;
    flex-wrap: wrap;
  }
  .meta-pill {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    color: white;
  }
  .pill-reps { background: var(--coral); }
  .pill-sets { background: var(--lavender); }
  .pill-rest { background: var(--peach); color: var(--charcoal); }
  .pill-time { background: var(--mint); }

  .check-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2.5px solid var(--light);
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .check-btn.checked {
    background: var(--mint);
    border-color: var(--mint);
    color: white;
  }

  /* EXPAND */
  .card-detail {
    display: none;
    padding: 0 1rem 1rem;
    border-top: 1px solid #f0f0f0;
  }
  .card-detail.open { display: block; }
  .detail-text {
    font-size: 0.82rem;
    color: var(--mid);
    line-height: 1.6;
    margin-bottom: 0.8rem;
    padding-top: 0.8rem;
  }
  .exercise-visual {
    background: linear-gradient(135deg, #f8f9fa, #fff0f5);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
    font-size: 3.5rem;
    letter-spacing: 0.5rem;
    margin-bottom: 0.8rem;
    border: 1px solid #ffe0e0;
    position: relative;
  }
  .visual-label {
    font-family: 'Fraunces', serif;
    font-size: 0.7rem;
    color: var(--mid);
    margin-top: 0.4rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .phases {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.8rem;
  }
  .phase {
    flex: 1;
    background: #f8f9fa;
    border-radius: 10px;
    padding: 0.6rem;
    text-align: center;
    font-size: 0.72rem;
  }
  .phase-num {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    display: block;
    margin-bottom: 0.2rem;
  }
  .phase-1 .phase-num { color: var(--coral); }
  .phase-2 .phase-num { color: var(--peach); }
  .phase-3 .phase-num { color: var(--mint); }
  .tip-box {
    background: linear-gradient(135deg, #fff5f0, #fff9f5);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    font-size: 0.78rem;
    color: var(--charcoal);
    border-left: 3px solid var(--coral);
    line-height: 1.5;
    margin-top: 0.6rem;
  }
  .tip-box strong { color: var(--coral); }

  /* REST DAY */
  .rest-day-card {
    background: linear-gradient(135deg, #f3f0ff, #fff0f8);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    border: 2px dashed var(--lavender);
  }
  .rest-day-card .big-emoji { font-size: 3rem; display: block; margin-bottom: 0.8rem; }
  .rest-day-card h3 { font-family: 'Fraunces', serif; color: var(--charcoal); margin-bottom: 0.5rem; }
  .rest-day-card p { font-size: 0.85rem; color: var(--mid); line-height: 1.6; }

  /* NOTES */
  .notes-card {
    background: linear-gradient(135deg, #fffbf0, #fff5f0);
    border-radius: 16px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    border: 1px solid #ffe0c0;
  }
  .notes-card h4 { font-family: 'Fraunces', serif; font-size: 1rem; color: var(--charcoal); margin-bottom: 0.6rem; }
  .notes-card ul { padding-left: 1.2rem; }
  .notes-card li { font-size: 0.8rem; color: var(--mid); margin-bottom: 0.3rem; line-height: 1.5; }

  /* BOTTOM RESET */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--light);
    padding: 0.8rem 1rem;
    display: flex;
    gap: 0.8rem;
  }
  .reset-btn {
    flex: 1;
    padding: 0.7rem;
    border-radius: 12px;
    border: 2px solid var(--light);
    background: white;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--mid);
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--coral); color: var(--coral); }
  .done-all-btn {
    flex: 2;
    padding: 0.7rem;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--coral), var(--peach));
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,107,0.3);
    transition: all 0.2s;
  }
  .done-all-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,107,0.4); }

  .spacer { height: 80px; }

  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: popIn 0.35s ease; }
</style>
</head>
<body>

<div class="header">
  <h1>💪 Mi Plan de Fuerza</h1>
  <p>Plan personalizado · Nivel principiante · Semana en curso</p>
  <div class="header-stats">
    <span class="stat-badge">3 días fuerza</span>

</div>

</div>

<div class="week-nav">
  <button class="week-btn" id="prev-week" onclick="changeWeek(-1)" disabled>◀</button>
  <h2 id="week-title">Semana 1 — Adaptación</h2>

</div>

<div class="day-tabs" id="day-tabs"></div>
<div class="day-content" id="day-content"></div>
<div class="spacer"></div>

<div class="bottom-bar">
  <button class="reset-btn" onclick="resetDay()">🔄 Reiniciar día</button>
  <button class="done-all-btn" onclick="completeDay()">✓ Marcar todo el día</button>
</div>

      pillRest: "Sin descanso",

// Configuración de días de la semana
const WEEK_DAYS = [
  { day: "Lun", label: "Lunes", type: "fuerza1", title: "Fuerza — Piernas y Core", desc: "Sentadilla · Puente · Flexión pared · Bird Dog", color: "#FF6B6B" },
  { day: "Mar", label: "Martes", type: "descanso", title: "Descanso activo", desc: "Camina suave 20-30 minutos si puedes", color: "#A29BFE" },
  { day: "Mié", label: "Miércoles", type: "fuerza2", title: "Fuerza — Espalda y Core", desc: "Zancada · Superman · Remo · Plancha", color: "#FF6B6B" },
  { day: "Jue", label: "Jueves", type: "descanso", title: "Descanso activo", desc: "Estiramientos suaves o caminar", color: "#A29BFE" },
  { day: "Vie", label: "Viernes", type: "fuerza3", title: "Fuerza — Cuerpo completo", desc: "Sumo · Flex inclinada · Bisagra · Dead Bug", color: "#FF6B6B" },
  { day: "Sáb", label: "Sábado", type: "movilidad", title: "Movilidad y respiración", desc: "Torácica · 90/90 · Gato-vaca · Respiración", color: "#FD79A8" },
  { day: "Dom", label: "Domingo", type: "descanso", title: "Descanso completo", desc: "Recuperación total. ¡Te lo mereces!", color: "#A29BFE" },
];

// ============================================================
// STATE
// ============================================================
let currentWeek = 0;
let currentDay = 0;
// completed[week][dayIndex][exId] = true/false
let completed = {};
try {
  const saved = localStorage.getItem('workout_completed');
  if (saved) completed = JSON.parse(saved);
} catch(e) {}

function save() {
  try { localStorage.setItem('workout_completed', JSON.stringify(completed)); } catch(e) {}
}
function isCompleted(week, day, exId) {
  return !!(completed[week] && completed[week][day] && completed[week][day][exId]);
}
function setCompleted(week, day, exId, val) {
  if (!completed[week]) completed[week] = {};
  if (!completed[week][day]) completed[week][day] = {};
  completed[week][day][exId] = val;
  save();
}

// ============================================================
// RENDER
// ============================================================
function getExercises(type) {
  if (type === 'fuerza1') return BASE_EXERCISES.fuerza1;
  if (type === 'fuerza2') return BASE_EXERCISES.fuerza2;
  if (type === 'fuerza3') return BASE_EXERCISES.fuerza3;
  if (type === 'movilidad') return BASE_EXERCISES.movilidad;
  return [];
}

// Ajuste por semana
function getWeekModifier(weekIdx, ex) {
  const sets = weekIdx < 2 ? 2 : weekIdx < 4 ? 3 : weekIdx < 6 ? 3 : 4;
  let setsLabel = sets + " series";
  // semana 4 = deload
  if (weekIdx === 3) setsLabel = "2 series (deload)";
  return { ...ex, pillSets: setsLabel };
}

function renderDayTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';
  WEEK_DAYS.forEach((d, i) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (i === currentDay ? ' active' : '');
    // Check if day is fully done
    const exs = getExercises(d.type);
    const allDone = exs.length > 0 && exs.every(e => isCompleted(currentWeek, i, e.id));
    if (allDone) tab.classList.add('done-day');
    tab.textContent = d.day;
    tab.onclick = () => { currentDay = i; render(); };
    container.appendChild(tab);
  });
}

function renderProgress() {
  let total = 0, done = 0;
  WEEK_DAYS.forEach((d, i) => {
    const exs = getExercises(d.type);
    exs.forEach(e => {
      total++;
      if (isCompleted(currentWeek, i, e.id)) done++;
    });
  });
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' ejercicios';
  document.getElementById('week-msg').style.display = (done === total && total > 0) ? 'block' : 'none';
}

function renderDayContent() {
  const container = document.getElementById('day-content');
  const dayData = WEEK_DAYS[currentDay];
  container.innerHTML = '';

  // Day header
  const h = document.createElement('div');
  h.className = 'day-header';
  h.style.borderLeftColor = dayData.color;
  let tagClass = '', tagText = '';
  if (dayData.type.startsWith('fuerza')) { tagClass = ''; tagText = '🏋️ Sesión de fuerza'; }
  else if (dayData.type === 'movilidad') { tagClass = 'mobility'; tagText = '🧘 Movilidad'; }
  else { tagClass = 'rest'; tagText = '😴 Descanso'; }
  h.innerHTML = `<h3>${dayData.title}</h3><p>${dayData.desc}</p><span class="day-tag ${tagClass}">${tagText}</span>`;
  container.appendChild(h);

  const exs = getExercises(dayData.type);

  if (exs.length === 0) {
    // Rest day
    const r = document.createElement('div');
    r.className = 'rest-day-card';
    let icon = '😴', msg = 'Hoy toca descansar. El descanso <strong>es parte del entrenamiento</strong> — es cuando el músculo crece y se repara. Si quieres, sal a caminar suave 20-30 minutos. Sin agobios.';
    if (dayData.day === 'Dom') { icon = '🌿'; msg = 'Descanso completo. Nada de ejercicio hoy. Deja que tu cuerpo se recupere al 100% para la semana que viene.'; }
    r.innerHTML = `<span class="big-emoji">${icon}</span><h3>${dayData.title}</h3><p>${msg}</p>`;
    container.appendChild(r);
    return;
  }

  // Notes for strength days
  if (dayData.type.startsWith('fuerza')) {
    const n = document.createElement('div');
    n.className = 'notes-card';
    n.innerHTML = `<h4>📋 Antes de empezar</h4><ul>
      <li>Calienta 5 min: caminata en el sitio + rotaciones de hombros y caderas</li>
      <li>Respira: espira en el esfuerzo, inspira al volver</li>
      <li>Si notas dolor (no molestia muscular) para y descansa</li>
      <li>Con talasemia: si te mareas o te falta mucho el aire, para y siéntate</li>
    </ul>`;
    container.appendChild(n);
  }

  exs.forEach(ex => {
    const mod = getWeekModifier(currentWeek, ex);
    const done = isCompleted(currentWeek, currentDay, ex.id);
    const card = document.createElement('div');
    card.className = 'exercise-card' + (done ? ' completed' : '');
    card.id = 'card-' + ex.id;

    const phases = mod.phases.map((p, i) => `<div class="phase phase-${i+1}"><span class="phase-num">${['①','②','③'][i]}</span>${p}</div>`).join('');

    card.innerHTML = `
      <div class="card-top" onclick="toggleCard('${ex.id}')">
        <div class="exercise-emoji" style="background:${ex.emojiColor}">${ex.emoji}</div>
        <div class="card-info">
          <h4>${mod.name}</h4>
          <div class="card-meta">
            <span class="meta-pill pill-reps">${mod.pillReps}</span>
            <span class="meta-pill pill-sets">${mod.pillSets}</span>
            <span class="meta-pill pill-rest">${mod.pillRest}</span>
            ${mod.pillTime ? `<span class="meta-pill pill-time">${mod.pillTime}</span>` : ''}
          </div>
        </div>
        <button class="check-btn ${done ? 'checked' : ''}" onclick="event.stopPropagation(); toggleDone('${ex.id}')" id="btn-${ex.id}">${done ? '✓' : ''}</button>
      </div>
      <div class="card-detail" id="detail-${ex.id}">
        <p class="detail-text">${ex.desc}</p>
        <div class="exercise-visual">
          ${mod.visual}
          <div class="visual-label">Secuencia del movimiento</div>
        </div>
        <div class="phases">${phases}</div>
        <div class="tip-box">💡 ${mod.tip}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(id) {
  const detail = document.getElementById('detail-' + id);
  detail.classList.toggle('open');
}

function toggleDone(id) {
  const current = isCompleted(currentWeek, currentDay, id);
  setCompleted(currentWeek, currentDay, id, !current);
  render();
  if (!current) {
    const btn = document.getElementById('btn-' + id);
    if (btn) btn.classList.add('pop');
  }
}

function resetDay() {
  if (!completed[currentWeek] || !completed[currentWeek][currentDay]) return;
  completed[currentWeek][currentDay] = {};
  save();
  render();
}

function completeDay() {
  const exs = getExercises(WEEK_DAYS[currentDay].type);
  exs.forEach(e => setCompleted(currentWeek, currentDay, e.id, true));
  render();
}

function changeWeek(dir) {
  currentWeek = Math.max(0, Math.min(7, currentWeek + dir));
  document.getElementById('week-title').textContent = WEEKS[currentWeek].title;
  document.getElementById('prev-week').disabled = currentWeek === 0;
  document.getElementById('next-week').disabled = currentWeek === 7;
  render();
}

function render() {
  document.getElementById('week-title').textContent = WEEKS[currentWeek].title;
  renderDayTabs();
  renderDayContent();
  renderProgress();
}

// Init — auto-select today
const today = new Date().getDay(); // 0=Sun
const dayMap = [6, 0, 1, 2, 3, 4, 5]; // Sun→6, Mon→0 etc
currentDay = dayMap[today] !== undefined ? dayMap[today] : 0;
render();
</script>
